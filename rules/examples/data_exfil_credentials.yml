id: "COMMUNITY-EXFIL-002"
name: "Credential file reading"
description: "Detects reading of credential, SSH key, or secret files which may indicate data exfiltration preparation"
severity: critical
category: file_system_access
pattern: "(?:readFile|readFileSync)\\s*\\([^)]*(?:\\.ssh/id_rsa|\\.npmrc|\\.env|\\.aws/credentials|\\.docker/config)"
file_pattern: "*.js"
exclude_paths:
  - "node_modules/"
  - "test/"
  - "*.test.js"
