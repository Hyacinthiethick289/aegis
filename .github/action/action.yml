name: "Aegis Supply Chain Scanner"
description: "Scan npm dependencies for malicious code, vulnerabilities, and supply chain risks"

branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Path to the project directory (must contain a package.json)"
    required: false
    default: "."
  fail-on:
    description: "Minimum severity to fail the build: 'critical', 'high', 'medium', 'low'"
    required: false
    default: "high"
  sarif:
    description: "Upload SARIF results to GitHub Security tab"
    required: false
    default: "true"
  skip-dev:
    description: "Skip devDependencies during scan"
    required: false
    default: "false"
  no-cache:
    description: "Bypass the local analysis cache"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      shell: bash

    - name: Cache cargo registry and build artifacts
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin/aegis-scan
        key: aegis-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          aegis-cargo-${{ runner.os }}-

    - name: Install aegis
      shell: bash
      run: |
        if ! command -v aegis-scan &> /dev/null; then
          cargo install aegis-scan
        else
          echo "aegis-scan already installed (cached)"
        fi

    - name: Run aegis scan
      id: scan
      shell: bash
      env:
        AEGIS_PATH: ${{ inputs.path }}
        AEGIS_FAIL_ON: ${{ inputs.fail-on }}
        AEGIS_SKIP_DEV: ${{ inputs.skip-dev }}
        AEGIS_NO_CACHE: ${{ inputs.no-cache }}
      run: |
        ARGS="scan ${AEGIS_PATH}"

        if [ "${AEGIS_SKIP_DEV}" = "true" ]; then
          ARGS="${ARGS} --skip-dev"
        fi

        if [ "${AEGIS_NO_CACHE}" = "true" ]; then
          ARGS="${ARGS} --no-cache"
        fi

        # Map fail-on to exit code handling
        set +e
        aegis-scan ${ARGS} --json > aegis-results.json 2>&1
        SCAN_EXIT=$?
        set -e

        # Display results in the log
        aegis-scan ${ARGS} || true

        # Determine if we should fail based on fail-on level
        if [ ${SCAN_EXIT} -ne 0 ]; then
          case "${AEGIS_FAIL_ON}" in
            critical)
              # Only fail on critical — check JSON for critical findings
              if jq -e '[.[] | select(.risk_label == "Critical")] | length > 0' aegis-results.json > /dev/null 2>&1; then
                echo "scan_failed=true" >> $GITHUB_OUTPUT
              else
                echo "scan_failed=false" >> $GITHUB_OUTPUT
              fi
              ;;
            high)
              # Fail on high or critical (default aegis behavior, exit code already 1)
              echo "scan_failed=true" >> $GITHUB_OUTPUT
              ;;
            medium)
              # Fail on medium, high, or critical
              if jq -e '[.[] | select(.risk_label == "Medium" or .risk_label == "High" or .risk_label == "Critical")] | length > 0' aegis-results.json > /dev/null 2>&1; then
                echo "scan_failed=true" >> $GITHUB_OUTPUT
              else
                echo "scan_failed=false" >> $GITHUB_OUTPUT
              fi
              ;;
            low)
              # Fail on anything non-clean
              if jq -e '[.[] | select(.risk_label != "Clean")] | length > 0' aegis-results.json > /dev/null 2>&1; then
                echo "scan_failed=true" >> $GITHUB_OUTPUT
              else
                echo "scan_failed=false" >> $GITHUB_OUTPUT
              fi
              ;;
            *)
              echo "scan_failed=true" >> $GITHUB_OUTPUT
              ;;
          esac
        else
          echo "scan_failed=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate SARIF report
      if: inputs.sarif == 'true'
      shell: bash
      env:
        AEGIS_PATH: ${{ inputs.path }}
        AEGIS_SKIP_DEV: ${{ inputs.skip-dev }}
        AEGIS_NO_CACHE: ${{ inputs.no-cache }}
      run: |
        ARGS="scan ${AEGIS_PATH} --sarif"

        if [ "${AEGIS_SKIP_DEV}" = "true" ]; then
          ARGS="${ARGS} --skip-dev"
        fi

        if [ "${AEGIS_NO_CACHE}" = "true" ]; then
          ARGS="${ARGS} --no-cache"
        fi

        aegis-scan ${ARGS} > results.sarif 2>/dev/null || true

    - name: Upload SARIF to GitHub Security
      if: inputs.sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
        category: aegis-supply-chain
      continue-on-error: true

    - name: Fail build if thresholds exceeded
      if: steps.scan.outputs.scan_failed == 'true'
      shell: bash
      run: |
        echo "::error::Aegis detected dependencies at or above the '${{ inputs.fail-on }}' severity threshold."
        exit 1
